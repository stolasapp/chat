# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

version: "2"
output:
  sort-order:
    - file
    - severity
    - linter
linters:
  default: all
  disable:
    - cyclop
    - dupl
    - err113
    - exhaustive
    - exhaustruct
    - funlen
    - gochecknoglobals
    - ireturn
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - testpackage
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    depguard:
      rules:
        main:
          files:
            - $all
          deny:
            - pkg: math/rand$
              desc: use math/rand/v2
    godox:
      keywords:
        - FIXME
    tagliatelle:
      case:
        rules:
          json: snake
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    sloglint:
      attr-only: true
    varnamelen:
      ignore-decls:
        - ok bool
        - sb *strings.Builder
        - w io.Writer
        - ws *websocket.Conn
  exclusions:
    generated: strict
    rules:
      # looser rules for tests
      - linters:
          - gochecknoglobals
          - goconst
        path: _test\.go$
      # contextcheck traces into templ-generated closures (named
      # $1) and cannot follow context through SendComponent ->
      # templ.Component.Render(ctx, w)
      - linters:
          - contextcheck
        text: '\$1.+ should pass the context parameter'
      # package comment lives in templ-generated files (excluded
      # by generated: strict)
      - linters:
          - revive
        text: "package-comments: should have a package comment"
        path: internal/view/
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/stolasapp/chat
  exclusions:
    generated: lax
